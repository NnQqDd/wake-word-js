<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wake Word Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs/dist/tf.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    #status { font-size: 1.2em; margin: 20px; }
    button { padding: 15px 30px; font-size: 1.1em; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Wake Word Demo</h1>
  <button id="startBtn">Start Listening</button>
  <div id="log"></div>
  <script type="module">
    import {WakeWordPipeline} from './classes.js';

    const MIN_CONFIDENCE = 0.9;
    const CHUNK_SAMPLES = 8192;
    const MAX_BUFFER_SAMPLES = 40960;
    const MAX_MODEL_SAMPLES = 40000;
    const MAX_COOLDOWN = 3;

    let WAKEWORD_PIPELINE = null;
    let AUDIO_SAMPLES = new Float32Array(0);
    let COOLDOWN = 0;

    // ==================== LOAD MODEL ====================
    async function initPipeline() {
      WAKEWORD_PIPELINE = await WakeWordPipeline.fromFiles(
        "onnx/mel-spectrogram.onnx",
        "onnx/speech-embedding.onnx",
        "onnx/vj5petgd.onnx",
        MAX_MODEL_SAMPLES
      );
    }

    // ==================== WAKE WORD CALLBACK ====================
    function wakeWordCallback(confidence) {
      COOLDOWN -= 1;
      log(`Confidence ${confidence.toFixed(4)}`);
      if (confidence > MIN_CONFIDENCE && COOLDOWN <= 0) {
        log(`WAKE WORD DETECTED! (conf = ${confidence.toFixed(4)})`);
        consoleLog(`WAKE WORD DETECTED! (conf = ${confidence.toFixed(4)})`);
        COOLDOWN = MAX_COOLDOWN;
      }
    }

    // ==================== MAIN AUDIO CALLBACK ====================
    // Called on the main thread whenever the worklet posts a buffer of samples.
    async function audioProcess(newSamples) {
      let current_samples = new Float32Array(AUDIO_SAMPLES.length + newSamples.length);
      current_samples.set(AUDIO_SAMPLES, 0);
      current_samples.set(newSamples, AUDIO_SAMPLES.length);
      if (current_samples.length > MAX_BUFFER_SAMPLES) {
        current_samples = current_samples.subarray(current_samples.length - MAX_BUFFER_SAMPLES);
      }
      AUDIO_SAMPLES = current_samples;

      const input_samples = AUDIO_SAMPLES.length > MAX_MODEL_SAMPLES
        ? AUDIO_SAMPLES.subarray(AUDIO_SAMPLES.length - MAX_MODEL_SAMPLES)
        : AUDIO_SAMPLES;

      const conf = await WAKEWORD_PIPELINE(input_samples);
      wakeWordCallback(conf);
    }

    // ==================== AUDIO WORKLET PROCESSOR (inlined as Blob) ====================
    // Runs on the dedicated audio rendering thread.
    // Accumulates samples into a fixed-size buffer, then transfers them
    // to the main thread via postMessage (zero-copy with Transferable).
    const WORKLET_CODE = `
      class BufferingProcessor extends AudioWorkletProcessor {
        constructor(options) {
          super();
          this._bufferSize = (options.processorOptions && options.processorOptions.bufferSize) || 4096;
          this._buffer = new Float32Array(this._bufferSize);
          this._filled = 0;
        }

        process(inputs) {
          // inputs[0][0] = first input, first (mono) channel
          const channel = inputs[0] && inputs[0][0];
          if (!channel) return true;

          let offset = 0;
          while (offset < channel.length) {
            const room = this._bufferSize - this._filled;
            const chunk = Math.min(room, channel.length - offset);
            this._buffer.set(channel.subarray(offset, offset + chunk), this._filled);
            this._filled += chunk;
            offset += chunk;

            if (this._filled === this._bufferSize) {
              // Transfer the buffer to the main thread (zero-copy)
              this.port.postMessage(this._buffer.buffer, [this._buffer.buffer]);
              // Allocate a fresh buffer for the next round
              this._buffer = new Float32Array(this._bufferSize);
              this._filled = 0;
            }
          }
          return true; // keep processor alive
        }
      }
      registerProcessor('buffering-processor', BufferingProcessor);
    `;

    // ==================== START MICROPHONE ====================
    async function startListening() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            sampleRate: 16000,
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
          }
        });

        const audioContext = new AudioContext({ sampleRate: 16000 });

        // Register the worklet from an inline Blob so no extra file is needed.
        const blob = new Blob([WORKLET_CODE], { type: 'application/javascript' });
        const workletUrl = URL.createObjectURL(blob);
        await audioContext.audioWorklet.addModule(workletUrl);
        URL.revokeObjectURL(workletUrl); // clean up

        const source = audioContext.createMediaStreamSource(stream);

        const workletNode = new AudioWorkletNode(audioContext, 'buffering-processor', {
          processorOptions: { bufferSize: CHUNK_SAMPLES },
          // One input, one output channel (output goes nowhere – we only read)
          numberOfInputs: 1,
          numberOfOutputs: 1,
          outputChannelCount: [1],
        });

        // Receive buffered samples on the main thread
        workletNode.port.onmessage = (event) => {
          // event.data is the transferred ArrayBuffer; wrap it in Float32Array
          const samples = new Float32Array(event.data);
          audioProcess(samples);
        };

        // source → worklet (no need to connect worklet to destination;
        // connecting to destination just prevents the context from silencing
        // the node due to the browser's "no audible output" optimisation)
        source.connect(workletNode);
        workletNode.connect(audioContext.destination);

        log("Microphone started successfully (AudioWorkletNode)");
      } catch (err) {
        console.error(err);
        alert("Microphone access denied or not supported");
      }
    }

    // ==================== HTML ====================
    const logEl = document.getElementById('log');
    const MAX_HISTORY_LENGTH = 24;
    let HISTORY = [];

    function consoleLog(msg) {
      const time = new Date().toLocaleTimeString();
      console.log(`[${time}] ${msg}`);
    }

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      HISTORY.push(`<div>[${time}] ${msg}</div>`);
      if (HISTORY.length > MAX_HISTORY_LENGTH) {
        HISTORY = HISTORY.slice(-MAX_HISTORY_LENGTH);
      }
      logEl.innerHTML = HISTORY.join('');
      logEl.scrollTop = logEl.scrollHeight;
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
      document.getElementById('startBtn').disabled = true;
      await initPipeline();
      await startListening();
    });
  </script>
</body>
</html>
