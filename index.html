<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wake Word Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs/dist/tf.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    #status { font-size: 1.2em; margin: 20px; }
    button { padding: 15px 30px; font-size: 1.1em; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Wake Word Demo</h1>
  <button id="startBtn">Start Listening</button>
  <div id="log"></div>
  <script type="module">
    import {WakeWordPipeline} from './classes.js';

    const MIN_CONFIDENCE = 0.9;
    const BUFFER_SAMPLES = 4096;         
    const MAX_BUFFER_SAMPLES = 10*BUFFER_SAMPLES;
    const MAX_MODEL_SAMPLES = 40000;
    const MAX_COOLDOWN = 6;

    let WAKEWORD_PIPELINE = null;
    let AUDIO_SAMPLES = new Float32Array(0);;
    let COOLDOWN = 0;

    // ==================== LOAD MODEL ====================
    async function initPipeline() {
      WAKEWORD_PIPELINE = await WakeWordPipeline.fromFiles(
        "mel-spectrogram.onnx",
        "speech-embedding.onnx",
        "vj5petgd.onnx",
        MAX_MODEL_SAMPLES
      );
    }

    // ==================== EXTRA AUDIO CALLBACK ====================
    function wakeWordCallback(confidence){
      COOLDOWN -= 1;
      log(`Confidence ${confidence.toFixed(4)}`);
      if (confidence > MIN_CONFIDENCE && COOLDOWN <= 0){
        log(`WAKE WORD DETECTED! (conf = ${confidence.toFixed(4)})`);
        consoleLog(`WAKE WORD DETECTED! (conf = ${confidence.toFixed(4)})`);
        COOLDOWN = MAX_COOLDOWN;
      }
    }
    
    // ==================== MAIN AUDIO CALLBACK ====================
    async function audioProcess(e) {
      let new_samples = e.inputBuffer.getChannelData(0); // mono
      
      let current_samples = new Float32Array(AUDIO_SAMPLES.length + new_samples.length);
      current_samples.set(AUDIO_SAMPLES, 0);
      current_samples.set(new_samples, AUDIO_SAMPLES.length);
      if (current_samples.length > MAX_BUFFER_SAMPLES){
        current_samples = current_samples.subarray(current_samples.length - MAX_BUFFER_SAMPLES);
      }
      AUDIO_SAMPLES = current_samples;
      
      let input_samples = null;
      if (AUDIO_SAMPLES.length > MAX_MODEL_SAMPLES){
        input_samples = AUDIO_SAMPLES.subarray(AUDIO_SAMPLES.length - MAX_MODEL_SAMPLES);  
      }
      else{
        input_samples = AUDIO_SAMPLES;
      }
      
      let conf = await WAKEWORD_PIPELINE(input_samples);
      wakeWordCallback(conf);
    }

    // ==================== START MICROPHONE ====================
    async function startListening() {
      let audioContext = null;
      let processor = null;
      let stream = null;

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            sampleRate: 16000,
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
          }
        });

        audioContext = new AudioContext({ sampleRate: 16000 });

        const source = audioContext.createMediaStreamSource(stream);
        processor = audioContext.createScriptProcessor(4096, 1, 1); // 4096 is good buffer size

        processor.onaudioprocess = audioProcess;
        source.connect(processor);
        processor.connect(audioContext.destination);
        log("Microphone started successfully");
      } catch (err) {
        console.error(err);
        alert("Microphone access denied or not supported");
      }
    }

    // ==================== HTML ====================
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const MAX_HISTORY_LENGTH = 24;
    let HISTORY = [];

    function consoleLog(msg){
      const time = new Date().toLocaleTimeString();
      console.log(`[${time}] ${msg}`);
    }

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      HISTORY.push(`<div>[${time}] ${msg}</div>`);
      if (HISTORY.length > MAX_HISTORY_LENGTH) {
        HISTORY = HISTORY.slice(-MAX_HISTORY_LENGTH);
      }
      logEl.innerHTML = HISTORY.join('');
      logEl.scrollTop = logEl.scrollHeight;
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
      document.getElementById('startBtn').disabled = true;
      await initPipeline();
      await startListening();
    });
  </script>
</body>
</html>
